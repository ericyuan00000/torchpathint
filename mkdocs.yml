site_name: torchpathint
site_description: Parallel adaptive quadrature for definite path integrals on PyTorch.
site_author: Eric Yuan
site_url: https://ericyuan00000.github.io/torchpathint/

repo_url: https://github.com/ericyuan00000/torchpathint
repo_name: ericyuan00000/torchpathint
edit_uri: blob/main/docs/

docs_dir: docs

nav:
  - Home: index.md
  - Theory: theory.md
  - API reference: api.md
  - Memory probe: memory.md
  - Migrating from torchpathdiffeq: migration.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - content.code.copy
    - content.action.edit
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

plugins:
  - search

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
